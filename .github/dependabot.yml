version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    versioning-strategy: increase
    ignore:
      # @types/node tracks the Node runtime major. Block major bumps so
      # Dependabot doesn't pull us onto a Node version we aren't actually
      # running (e.g. 26 while the Dockerfile is still on 24). When the
      # Dockerfile moves to the next LTS, bump this manually in the same PR.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      # Bundle all non-major upgrades into one weekly PR per group to keep
      # the queue manageable. Majors still land as individual PRs so they
      # can be reviewed for breakage.
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    ignore:
      # Dependabot has no notion of "LTS only". Block major bumps on Node so
      # we don't get auto-PRs to the current-but-not-yet-LTS line (odd
      # majors never go LTS; even majors only become LTS in October of
      # their release year). When a new LTS lands we edit the Dockerfile
      # by hand. Patch + minor updates of the pinned major still come
      # through this rule.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
