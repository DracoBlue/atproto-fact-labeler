version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      # Bundle all non-major upgrades into one weekly PR per group to keep
      # the queue manageable. Majors still land as individual PRs so they
      # can be reviewed for breakage.
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
